<!doctype html>
<html lang="en">
<head>
  <link rel="stylesheet" href="style.css">
</head>
<header id="main-header" class="bg-success">
    <div class="container" style="display: flex; align-items: center; gap: 12px;">
      <span style="font-size:2.2rem; color:#90caf9;">&#128214;</span>
      <h1 id="header-title" style="color:#90caf9;">MY Books</h1>
    </div> <!-- container-->
  </header>

  <div class="container">
    <div id="main" class="card card-body">

      <h2 class="title">Add Items</h2>

      <form id="book-form">
        <input type="text" id="title" placeholder="Book Title" required>
        <input type="text" id="author" placeholder="Author" required>
        <input type="submit" class="btn" value="Add Book">
      </form>

      <h2 class="title">Book List</h2>

      <ul id="book-list" class="list-group">
        <!-- Books will appear here -->
      </ul>

    </div> <!-- main -- card -- card-body -->
  </div> <!-- container -->
  <script src="dom.js"></script>
</html>
